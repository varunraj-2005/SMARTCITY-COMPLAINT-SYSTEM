<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City - Officer Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body>
    <!-- Officer Dashboard Container -->
    <div class="dashboard-container officer-dashboard">
        
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-left">
                <h1>🚨 Officer Management Dashboard</h1>
                <p>Manage and resolve city issues</p>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <span id="officerName">Officer</span>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                </div>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('issues')">📋 All Issues</button>
            <button class="tab-btn" onclick="switchTab('assigned')">👤 My Issues</button>
            <button class="tab-btn" onclick="switchTab('statistics')">📈 Stats</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboardTab" class="tab-content active">
            <div class="dashboard-grid">
                <!-- Stats Cards -->
                <div class="stats-container">
                    <div class="stat-card">
                        <div class="stat-number" id="totalIssues">0</div>
                        <div class="stat-label">Total Issues</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="submittedCount">0</div>
                        <div class="stat-label">Submitted</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="inProgressCount">0</div>
                        <div class="stat-label">In Progress</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="resolvedCount">0</div>
                        <div class="stat-label">Resolved</div>
                    </div>
                </div>

                <!-- Recent Issues -->
                <div class="recent-issues">
                    <h3>🔔 Recent Issues</h3>
                    <div id="recentIssuesList" class="issues-list"></div>
                </div>

                <!-- Connected Users -->
                <div class="connected-users">
                    <h3>👥 Connected Users</h3>
                    <div id="usersList" class="users-list"></div>
                </div>
            </div>
        </div>

        <!-- Issues Tab -->
        <div id="issuesTab" class="tab-content">
            <div class="issues-filter">
                <input type="text" id="searchIssue" placeholder="Search issues..." onkeyup="filterIssues()">
                <select id="filterStatus" onchange="filterIssues()">
                    <option value="">All Status</option>
                    <option value="submitted">Submitted</option>
                    <option value="in_progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
            <div id="issuesContainer" class="issues-list"></div>
        </div>

        <!-- Assigned Issues Tab -->
        <div id="assignedTab" class="tab-content">
            <div id="assignedIssuesContainer" class="issues-list"></div>
        </div>

        <!-- Statistics Tab -->
        <div id="statisticsTab" class="tab-content">
            <div class="statistics-grid">
                <div class="stat-box">
                    <h4>Issues by Status</h4>
                    <div id="statusChart" class="chart-placeholder"></div>
                </div>
                <div class="stat-box">
                    <h4>Response Time</h4>
                    <div id="responseChart" class="chart-placeholder"></div>
                </div>
                <div class="stat-box">
                    <h4>Priority Distribution</h4>
                    <div id="priorityChart" class="chart-placeholder"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Issue Detail Modal -->
    <div id="issueModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Issue Details</h2>
            
            <div class="modal-body">
                <div class="issue-detail-group">
                    <label>Title:</label>
                    <p id="modalIssueTitle"></p>
                </div>

                <div class="issue-detail-group">
                    <label>Description:</label>
                    <p id="modalIssueDesc"></p>
                </div>

                <div class="issue-detail-group">
                    <label>Location:</label>
                    <p id="modalIssueLocation"></p>
                </div>

                <div class="issue-detail-group">
                    <label>Reported By:</label>
                    <p id="modalIssueReporter"></p>
                </div>

                <div class="issue-detail-group">
                    <label>Status:</label>
                    <select id="modalIssueStatus" class="form-control">
                        <option value="submitted">Submitted</option>
                        <option value="in_progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                        <option value="closed">Closed</option>
                    </select>
                </div>

                <div class="issue-detail-group">
                    <label>Priority:</label>
                    <select id="modalIssuePriority" class="form-control">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>

                <div class="issue-detail-group">
                    <label>Assign To Me:</label>
                    <button onclick="assignToMe()" class="btn btn-primary">Assign</button>
                </div>

                <div class="issue-detail-group">
                    <label>Add Comment:</label>
                    <textarea id="modalComment" placeholder="Add your comment..." style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;"></textarea>
                    <button onclick="addComment()" class="btn btn-primary" style="margin-top: 10px;">Post Comment</button>
                </div>

                <div class="issue-detail-group">
                    <label>Comments:</label>
                    <div id="commentsList" class="comments-list"></div>
                </div>
            </div>

            <div class="modal-footer">
                <button onclick="saveIssueChanges()" class="btn btn-success">Save Changes</button>
                <button onclick="closeModal()" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Alert -->
    <div id="successAlert" class="alert alert-success hidden">
        <span id="alertMessage"></span>
    </div>

    <script src="officer-script.js"></script>
</body>

</html>
